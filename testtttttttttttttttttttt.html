<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        /* Анимация моргания */
        @keyframes blink {

            0%,
            90%,
            100% {
                transform: scaleY(1);
            }

            95% {
                transform: scaleY(0.1);
            }

            /* Глаз схлопывается по вертикали */
        }

        .eye-blink {
            animation: blink 4s infinite;
            transform-origin: center;
            /* Важно: схлопывание к центру */
        }

        /* Эффект испуга (пульсация зрачка) */
        @keyframes shake {
            0% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(2px, -2px);
            }

            75% {
                transform: translate(-2px, 2px);
            }
        }

        .pupil-scared {
            animation: shake 0.1s infinite;
            filter: contrast(150%);
            /* Делаем зрачок чуть ярче или четче */
        }

        #mask-shutter {
            transition: transform 0.15s ease-in-out;
            transform-origin: top;
            /* Моргание сверху вниз */
        }

        /* Класс для закрытого глаза */
        .is-closed #mask-shutter {
            transform: scaleY(0);
        }

        /* Автоматическое периодическое моргание */
        @keyframes auto-blink {

            0%,
            90%,
            100% {
                transform: scaleY(1);
            }

            95% {
                transform: scaleY(0);
            }
        }

        .auto-blink-mode #mask-shutter {
            animation: auto-blink 5s infinite;
        }
    </style>
</head>

<body>
    <div class="eye-container">
        <svg viewBox="0 -960 960 960" width="200" id="eye-svg">
            <defs>
                <!-- Маска: белый цвет показывает, черный скрывает -->
                <mask id="eye-mask">
                    <rect id="mask-shutter" x="0" y="-960" width="960" height="960" fill="white" />
                </mask>
            </defs>

            <!-- Группа, к которой применена маска -->
            <g mask="url(#eye-mask)">
                <!-- Весь ваш предыдущий код (белок + зрачок) -->
                <path id="eye-frame" d="M240-40H120q-33 0-56.5-23.5T40-120v-120h80v120h120v80Zm480 0v-80h120v-120h80v120q0 33-23.5 56.5T840-40H720ZM480-220q-120 0-217.5-71T120-480q45-118 142.5-189T480-740q120 0 217.5 71T840-480q-45 118-142.5 189T480-220Zm0-80q88 0 161-48t112-132q-39-84-112-132t-161-48q-88 0-161 48T207-480q39 84 112 132t161 48ZM40-720v-120q0-33 23.5-56.5T120-920h120v80H120v120H40Zm800 0v-120H720v-80h120q33 0 56.5 23.5T920-840v120h-80Z" fill="#333" />
                <g id="pupil">
                    <path d="M480-340q58 0 99-41t41-99q0-58-41-99t-99-41q-58 0-99 41t-41 99q0 58 41 99t99 41Zm0-80q-25 0-42.5-17.5T420-480q0-25 17.5-42.5T480-540q25 0 42.5 17.5T540-480q0 25-17.5 42.5T480-420Z" fill="#000" />
                </g>
            </g>
        </svg>
    </div>
</body>

<script>
    const eyeContainer = document.querySelector('.eye-container');
    const pupilGroup = document.getElementById('pupil');

    // Функция смены "настроения" глаза
    function setEyeState(state) {
        // Сбрасываем старые состояния
        eyeContainer.classList.remove('is-sleeping', 'is-scared');

        if (state === 'scared') {
            pupilGroup.classList.add('pupil-scared');
        } else if (state === 'sleeping') {
            eyeContainer.classList.add('eye-blink'); // Начинает моргать или закрывается
        }
    }

    // Пример: при клике глаз "пугается" на 1 секунду
    document.addEventListener('mousedown', () => {
        setEyeState('scared');
        setTimeout(() => pupilGroup.classList.remove('pupil-scared'), 1000);
    });

    const eyeSvg = document.getElementById('eye-svg');

    // 1. Просто моргнуть один раз
    function blinkOnce() {
        eyeSvg.classList.add('is-closed');
        setTimeout(() => {
            eyeSvg.classList.remove('is-closed');
        }, 150);
    }

    // 2. Включить режим "живого" глаза (моргает сам раз в 5 сек)
    eyeSvg.classList.add('auto-blink-mode');

    // 3. Закрыть глаз, когда мышка нажата
    document.addEventListener('mousedown', () => eyeSvg.classList.add('is-closed'));
    document.addEventListener('mouseup', () => eyeSvg.classList.remove('is-closed'));

    // Интервальное моргание для живости
    setInterval(() => {
        if (!eyeSvg.classList.contains('is-closed')) {
            blinkOnce();
        }
    }, 4000);
    
document.addEventListener('mouseleave', () => {
  console.log("Курсор покинул страницу");
  // Здесь можно вернуть зрачок в центр (translate(0,0))
  // Или запустить анимацию закрытия глаза (is-closed)
  eyeSvg.classList.add('is-closed');
});
</script></html>
